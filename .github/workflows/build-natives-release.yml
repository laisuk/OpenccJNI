name: Build OpenccWrapper natives and release

on:
  push:
    tags:
      - "v*" # e.g. v1.0.0-beta1
  workflow_dispatch:

permissions:
  contents: read

env:
  CPP_SRC: openccjni/src/main/java/openccjni/OpenccWrapper.cpp
  JAVA_SRC_CLASS: openccjni/src/main/java/openccjni/OpenccWrapper.java openccjni/src/main/java/openccjni/OpenccConfig.java

  CAPI_INCLUDE: openccjni/src/main/java/openccjni

  LINUX_X86_64_LIB_DIR: openccjni/src/main/resources/openccjni/natives/linux-x86_64
  LINUX_AARCH64_LIB_DIR: openccjni/src/main/resources/openccjni/natives/linux-aarch64
  MACOS_ARM64_LIB_DIR: openccjni/src/main/resources/openccjni/natives/macos-arm64
  MACOS_X86_64_LIB_DIR: openccjni/src/main/resources/openccjni/natives/macos-x86_64

  CAPI_LIB_NAME: opencc_fmmseg_capi

jobs:
  build_natives:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64 .so (manylinux2014)
            runs_on: ubuntu-latest
            platform: linux-x86_64
            wrapper_out: artifacts/linux-x86_64/libOpenccWrapper.so
            capi_dir: openccjni/src/main/resources/openccjni/natives/linux-x86_64
            capi_file: libopencc_fmmseg_capi.so
            java_os_include: linux
            manylinux_image: quay.io/pypa/manylinux2014_x86_64:latest

          - name: Linux aarch64 .so (manylinux2014)
            runs_on: ubuntu-24.04-arm
            platform: linux-aarch64
            wrapper_out: artifacts/linux-aarch64/libOpenccWrapper.so
            capi_dir: openccjni/src/main/resources/openccjni/natives/linux-aarch64
            capi_file: libopencc_fmmseg_capi.so
            java_os_include: linux
            manylinux_image: quay.io/pypa/manylinux2014_aarch64:latest

          - name: macOS arm64 .dylib
            runs_on: macos-latest
            platform: macos-arm64
            wrapper_out: artifacts/macos-arm64/libOpenccWrapper.dylib
            capi_dir: openccjni/src/main/resources/openccjni/natives/macos-arm64
            capi_file: libopencc_fmmseg_capi.dylib
            java_os_include: darwin

          - name: macOS x86_64 .dylib
            runs_on: macos-15-intel
            platform: macos-x86_64
            wrapper_out: artifacts/macos-x86_64/libOpenccWrapper.dylib
            capi_dir: openccjni/src/main/resources/openccjni/natives/macos-x86_64
            capi_file: libopencc_fmmseg_capi.dylib
            java_os_include: darwin

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Show tool versions
        shell: bash
        run: |
          set -euo pipefail
          java -version
          javac -version

      - name: Generate JNI header
        shell: bash
        run: |
          set -euo pipefail
          javac -h . openccjni/src/main/java/openccjni/OpenccWrapper.java openccjni/src/main/java/openccjni/OpenccConfig.java

      - name: Verify native CAPI exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ matrix.capi_dir }}/${{ matrix.capi_file }}"
          ls -la "${{ matrix.capi_dir }}"

      - name: Build wrapper on Linux in manylinux2014 container
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "${{ matrix.wrapper_out }}")"

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --entrypoint /bin/bash \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            -v "${JAVA_HOME}:${JAVA_HOME}:ro" \
            -e JAVA_HOME="${JAVA_HOME}" \
            -e CPP_SRC="openccjni/src/main/java/openccjni/OpenccWrapper.cpp" \
            -e CAPI_INCLUDE="openccjni/src/main/java/openccjni" \
            -e CAPI_LIB_NAME="opencc_fmmseg_capi" \
            -e CAPI_DIR="${{ matrix.capi_dir }}" \
            -e WRAPPER_OUT="${{ matrix.wrapper_out }}" \
            "${{ matrix.manylinux_image }}" -lc '
              set -euxo pipefail

              if [ -d /opt/rh/devtoolset-11/root/usr/bin ]; then
                export PATH="/opt/rh/devtoolset-11/root/usr/bin:$PATH"
              elif [ -d /opt/rh/devtoolset-10/root/usr/bin ]; then
                export PATH="/opt/rh/devtoolset-10/root/usr/bin:$PATH"
              elif [ -d /opt/rh/devtoolset-9/root/usr/bin ]; then
                export PATH="/opt/rh/devtoolset-9/root/usr/bin:$PATH"
              fi

              g++ --version
              test -f "${CAPI_DIR}/lib${CAPI_LIB_NAME}.so"

              mkdir -p "$(dirname "${WRAPPER_OUT}")"

              g++ -shared -fPIC -O2 -std=c++17 \
                -o "${WRAPPER_OUT}" \
                "${CPP_SRC}" \
                -I . \
                -I "${JAVA_HOME}/include" \
                -I "${JAVA_HOME}/include/linux" \
                -I "${CAPI_INCLUDE}" \
                -L "${CAPI_DIR}" -l${CAPI_LIB_NAME} \
                -Wl,-rpath,'\''$ORIGIN'\''

              file "${WRAPPER_OUT}" || true
              readelf --version-info "${WRAPPER_OUT}" | grep GLIBC || true
            '

      - name: Verify manylinux2014 GLIBC baseline
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          MAX_GLIBC="$(readelf --version-info "${{ matrix.wrapper_out }}" | grep -o 'GLIBC_[0-9.]*' | sort -V | tail -n1 || true)"
          echo "Max GLIBC: ${MAX_GLIBC:-<none>}"

          if [[ -n "${MAX_GLIBC}" ]] && [[ "$(printf '%s\n' "${MAX_GLIBC}" "GLIBC_2.17" | sort -V | tail -n1)" != "GLIBC_2.17" ]]; then
            echo "ERROR: ${MAX_GLIBC} is newer than manylinux2014 baseline GLIBC_2.17"
            exit 1
          fi

      - name: Build wrapper on macOS
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${{ matrix.wrapper_out }}")"

          clang++ -shared -fPIC -O2 -std=c++17 \
            -o "${{ matrix.wrapper_out }}" \
            openccjni/src/main/java/openccjni/OpenccWrapper.cpp \
            -I . \
            -I "${JAVA_HOME}/include" \
            -I "${JAVA_HOME}/include/darwin" \
            -I openccjni/src/main/java/openccjni \
            -L "${{ matrix.capi_dir }}" -lopencc_fmmseg_capi \
            -Wl,-rpath,@loader_path

          file "${{ matrix.wrapper_out }}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenccWrapper-${{ matrix.platform }}
          path: ${{ matrix.wrapper_out }}
          if-no-files-found: error